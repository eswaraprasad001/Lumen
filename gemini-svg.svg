<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <rect id="app-bg" width="400" height="400" fill="#35281c" />

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <linearGradient id="beamGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#deb06b" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#deb06b" stop-opacity="0" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <use href="#app-bg" />

  <rect x="75" y="75" width="250" height="250" rx="60" fill="#1b140d" filter="url(#shadow)" />

  <polygon points="270,115 100,150 170,270" fill="url(#beamGrad)" style="mix-blend-mode: screen;" />

  <g fill="#f3eedd">
    <rect x="105" y="135" width="190" height="24" rx="12" />
    
    <rect x="105" y="173" width="190" height="24" rx="12" />
    
    <rect x="105" y="211" width="110" height="24" rx="12" />
    <rect x="230" y="211" width="65" height="24" rx="12" />
    
    <rect x="105" y="249" width="145" height="24" rx="12" />
  </g>

  <circle cx="270" cy="115" r="15" fill="#deb06b" filter="url(#glow)" />
</svg>
